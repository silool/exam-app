<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#g)"/>
  <!-- Maskable safe zone (80% inner) -->
  <rect x="51.2" y="51.2" width="409.6" height="409.6" rx="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Pen icon path -->
  <g transform="translate(130, 110)" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Paper -->
    <rect x="0" y="30" width="180" height="240" rx="16" fill="rgba(255,255,255,0.2)" stroke="white"/>
    <!-- Lines on paper -->
    <line x1="30" y1="90" x2="150" y2="90" stroke="rgba(255,255,255,0.4)" stroke-width="12"/>
    <line x1="30" y1="130" x2="130" y2="130" stroke="rgba(255,255,255,0.4)" stroke-width="12"/>
    <line x1="30" y1="170" x2="140" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="12"/>
    <line x1="30" y1="210" x2="100" y2="210" stroke="rgba(255,255,255,0.4)" stroke-width="12"/>
    <!-- Checkmark -->
    <circle cx="220" cy="180" r="50" fill="rgba(255,255,255,0.2)" stroke="white"/>
    <polyline points="195,180 215,200 250,160" stroke="white" stroke-width="16"/>
  </g>
</svg>
